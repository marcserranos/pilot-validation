[workspace]
name = "hla-resolve-env"
version = "0.1.0"
description = "Pixi environment for HLA-Resolve (long-read PacBio HiFi HLA typing) -- Aleix's Phase 1 workstream"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

# Translated 1:1 from hla_resolve's own environment.yml (matthewglasenapp/hla_resolve),
# not re-derived -- exact version pins preserved.
[dependencies]
python = "3.12.*"
pip = "*"
htslib = "1.21.*"
bcftools = "1.21.*"
cutadapt = "5.1.*"
fastplong = "0.2.2.*"
freebayes = "1.3.10.*"
hiphase = "1.5.0.*"
openjdk = "8.*"
pbmarkdup = "1.2.0.*"
pbtk = "3.5.0.*"
samtools = "1.21.*"
pandas = "2.3.3.*"
pysam = "0.23.3.*"
biopython = "1.85.*"
sawfish = "2.0.3.*"
pbsv = "2.10.0.*"
sniffles = "2.7.0.*"
trgt = "4.0.0.*"
mosdepth = "0.3.10.*"
bedtools = "2.31.1.*"
whatshap = "2.3.*"
apptainer = "*"

[pypi-dependencies]
edlib = "==1.3.9.post1"
art = "==6.5"
vcf2fasta = { git = "https://github.com/matthewglasenapp/vcf2fasta.git" }
